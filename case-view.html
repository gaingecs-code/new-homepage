<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    try {
      var root = document.documentElement;
      if (root.classList) root.classList.add("case-view-html");
      else root.className += " case-view-html";
    } catch (e) {}
  </script>
  <title>사례 보기</title>
  <!-- 배포 후 본문·에셋 캐시 갱신: 아래 content만 올리면 CSS/JS/JSON URL에 동일 v가 붙습니다. -->
  <meta name="case-view-rev" content="case-view-1" />
  <link id="case-view-stylesheet" rel="stylesheet" href="css/style.css" />
  <script>
    try {
      var m = document.querySelector('meta[name="case-view-rev"]');
      var v = m && m.getAttribute("content");
      var link = document.getElementById("case-view-stylesheet");
      if (link && v) link.href = "css/style.css?v=" + encodeURIComponent(v);
    } catch (e) {}
  </script>
</head>
<body class="case-view-page">
  <main class="case-view-main">
    <p class="case-view-state" id="case-view-state" role="status">불러오는 중…</p>
    <article class="case-view-article board-article-modal" id="case-view-article" hidden>
      <div class="case-view-article-inner board-article-body">
        <h1 class="board-article-title" id="case-view-title"></h1>
        <p class="case-view-meta" id="case-view-meta"></p>
        <div class="board-article-content" id="case-view-content"></div>
      </div>
    </article>
  </main>

  <script>
    try {
      var m = document.querySelector('meta[name="case-view-rev"]');
      var v = m && m.getAttribute("content");
      var s = document.createElement("script");
      s.src = "js/case-view.js" + (v ? "?v=" + encodeURIComponent(v) : "");
      document.body.appendChild(s);
    } catch (e) {}
  </script>
</body>
</html>
