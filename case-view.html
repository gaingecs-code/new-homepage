<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사례 보기</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="case-view-page">
  <div class="case-view-toolbar">
    <button type="button" class="case-view-btn" id="case-view-close">닫기</button>
    <a class="case-view-link-muted" href="testimonials.html">창이 닫히지 않으면 목록으로</a>
    <a class="case-view-btn case-view-btn--primary" href="testimonials.html">사례 목록으로</a>
  </div>

  <main class="case-view-main">
    <p class="case-view-state" id="case-view-state" role="status">불러오는 중…</p>
    <article class="case-view-article board-article-modal" id="case-view-article" hidden>
      <div class="case-view-article-inner board-article-body">
        <h1 class="board-article-title" id="case-view-title"></h1>
        <p class="case-view-meta" id="case-view-meta"></p>
        <div class="board-article-content" id="case-view-content"></div>
      </div>
    </article>
  </main>

  <script src="js/case-view.js"></script>
</body>
</html>
