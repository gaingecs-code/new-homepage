<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/webp" href="/assets/web-logo.webp" />
  <title>작성자 게시글</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="author-posts-popup">
  <main>
    <section aria-label="작성자 게시글 목록">
      <div class="container">
        <header class="author-posts-popup-header">
          <h1 class="author-posts-popup-title" id="authorPostsHeading">작성자 게시글</h1>
          <button type="button" class="author-posts-popup-close" id="authorPostsClose">닫기</button>
        </header>

        <ul class="board-list" id="authorPostsList" aria-label="작성자 게시글 목록"></ul>

        <nav class="board-pagination" id="authorPostsPagination" aria-label="작성자 게시글 페이지 이동"></nav>
        <p class="author-posts-popup-empty" id="authorPostsEmpty" hidden>해당 작성자의 게시글이 없습니다.</p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var STORAGE_KEY = "testimonialsBoardPosts";
      var PAGE_SIZE = 10;
      var currentPage = 1;

      var params = new URLSearchParams(window.location.search);
      var authorName = (params.get("author") || "").trim();

      var headingEl = document.getElementById("authorPostsHeading");
      var listEl = document.getElementById("authorPostsList");
      var paginationEl = document.getElementById("authorPostsPagination");
      var emptyEl = document.getElementById("authorPostsEmpty");
      var closeBtn = document.getElementById("authorPostsClose");

      function loadAllPosts() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          var parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (err) {
          return [];
        }
      }

      function escapeHtml(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      /** collectBoardPosts() 의 id; 없거나 board-post-* 이면 상세 링크 없음 */
      function postDetailHref(post) {
        var id = post && post.id != null ? String(post.id).trim() : "";
        if (!id || id.indexOf("board-post-") === 0) return "#";
        try {
          return new URL("case-view.html?id=" + encodeURIComponent(id), window.location.href).href;
        } catch (e) {
          return "#";
        }
      }

      var CASE_VIEW_POPUP_FEATURES = "noopener,noreferrer,width=1080,height=900";

      listEl.addEventListener("click", function (e) {
        var a = e.target.closest("a.author-posts-open-case");
        if (!a || !listEl.contains(a)) return;
        if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
        if (e.button !== 0) return;
        var url = a.getAttribute("href");
        if (!url || url === "#") return;
        e.preventDefault();
        window.open(url, "_blank", CASE_VIEW_POPUP_FEATURES);
      });

      function render(posts, page) {
        var totalPages = Math.max(1, Math.ceil(posts.length / PAGE_SIZE));
        currentPage = Math.max(1, Math.min(page, totalPages));
        var start = (currentPage - 1) * PAGE_SIZE;
        var pagePosts = posts.slice(start, start + PAGE_SIZE);

        listEl.innerHTML = "";
        pagePosts.forEach(function (post) {
          var href = postDetailHref(post);
          var isOpenable = href !== "#";
          var linkAttrs = 'href="' + href.replace(/"/g, "%22") + '"';
          var thumbClass = "board-thumb-link" + (isOpenable ? " author-posts-open-case" : "");
          var titleClass = "board-title" + (isOpenable ? " author-posts-open-case" : "");
          var titleText = post.title || "제목 없음";
          var li = document.createElement("li");
          li.className = "board-item";
          if (isOpenable && post.id) {
            li.setAttribute("data-admin-item-key", String(post.id));
          }
          li.innerHTML =
            "<a " +
            linkAttrs +
            ' class="' +
            thumbClass +
            '" aria-label="' +
            escapeHtml(titleText + " 썸네일") +
            '">' +
            '<img class="board-thumb-image" src="' +
            escapeHtml(post.thumbnail || "") +
            '" alt="' +
            escapeHtml(titleText + " 썸네일") +
            '" loading="lazy" decoding="async" />' +
            "</a>" +
            '<div class="board-meta">' +
            "<a " +
            linkAttrs +
            ' class="' +
            titleClass +
            '" aria-label="' +
            escapeHtml(titleText + " 본문 열기") +
            '">' +
            escapeHtml(titleText) +
            "</a>" +
            '<span class="board-author">' +
            escapeHtml(post.author || "작성자") +
            "</span>" +
            "</div>";
          listEl.appendChild(li);
        });

        paginationEl.innerHTML = "";
        if (posts.length > PAGE_SIZE) {
          var numbersWrap = document.createElement("div");
          numbersWrap.className = "board-page-numbers";
          for (var i = 1; i <= totalPages; i += 1) {
            var btn = document.createElement("a");
            btn.href = "#";
            btn.className = "board-page-num" + (i === currentPage ? " is-current" : "");
            btn.setAttribute("data-page", String(i));
            if (i === currentPage) {
              btn.setAttribute("aria-current", "page");
            }
            btn.textContent = String(i);
            numbersWrap.appendChild(btn);
          }
          paginationEl.appendChild(numbersWrap);
        }
      }

      var allPosts = loadAllPosts();
      var authorPosts = allPosts.filter(function (post) {
        return (post.author || "").trim() === authorName;
      });

      headingEl.textContent = authorName ? authorName + " 작성 게시글" : "작성자 게시글";

      if (!authorPosts.length) {
        emptyEl.hidden = false;
      } else {
        emptyEl.hidden = true;
        render(authorPosts, 1);
      }

      paginationEl.addEventListener("click", function (e) {
        var pageLink = e.target.closest(".board-page-num");
        if (!pageLink) return;
        e.preventDefault();
        var targetPage = parseInt(pageLink.getAttribute("data-page"), 10);
        if (!Number.isNaN(targetPage)) {
          render(authorPosts, targetPage);
        }
      });

      closeBtn.addEventListener("click", function () {
        window.close();
      });
    })();
  </script>
</body>
</html>
