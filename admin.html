<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지로 이동 중</title>
  <style>
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      background: #f8fafc;
      color: #111827;
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      box-sizing: border-box;
    }
    .card {
      width: min(560px, 100%);
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1.2rem 1rem;
      box-sizing: border-box;
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.1rem; }
    p { margin: 0.35rem 0; line-height: 1.6; color: #4b5563; }
    a { color: #1d4ed8; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>새 Admin으로 이동 중입니다</h1>
      <p id="admin-redirect-text">잠시만 기다려주세요...</p>
      <p>
        이동이 안 되면
        <a id="admin-link" href="/admin/login">여기를 클릭</a>
        해주세요.
      </p>
    </section>
  </main>

  <script>
    (function () {
      var target = "/admin/login";
      var textEl = document.getElementById("admin-redirect-text");
      var linkEl = document.getElementById("admin-link");

      // 로컬 파일로 직접 열었을 때는 개발 서버 주소를 안내.
      if (location.protocol === "file:") {
        textEl.textContent = "파일 직접 실행 상태입니다. admin 폴더에서 npm run dev 실행 후 접속해주세요.";
        linkEl.href = "http://localhost:5173/admin/login";
        linkEl.textContent = "http://localhost:5173/admin/login";
        return;
      }

      linkEl.href = target;
      textEl.textContent = "새 Admin 로그인 화면으로 이동합니다.";
      setTimeout(function () {
        location.replace(target);
      }, 80);
    })();
  </script>
</body>
</html>
